<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Photo Intelligence Timeline</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#eef2f3;
    padding:40px;
}

h1{
    border-bottom:3px solid #3498db;
    padding-bottom:10px;
}

.timeline{
    border-left:4px solid #3498db;
    margin-left:40px;
    padding-left:25px;
}

.event{
    position:relative;
    background:white;
    padding:15px;
    margin-bottom:25px;
    border-radius:10px;
    box-shadow:0 4px 6px rgba(0,0,0,0.1);
    width:320px;
}

.event::before{
    content:"";
    position:absolute;
    left:-33px;
    top:20px;
    width:14px;
    height:14px;
    background:#3498db;
    border-radius:50%;
}

.date{
    font-weight:bold;
    color:#2980b9;
    margin-bottom:10px;
}

.photo{
    max-width:100%;
    border-radius:8px;
    margin:10px 0;
}

.label{
    font-weight:bold;
    color:#555;
}

</style>
</head>

<body>

<h1>Photo Timeline</h1>

<div class="timeline">

{{ EVENTS }}

</div>

</body>
</html>
